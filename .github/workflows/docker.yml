name: Docker image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/endlessjy/jfa-go

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker build version
        id: build_version
        shell: bash
        run: |
          css_version="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.6.0)"
          app_version="$(git describe --exact-match HEAD 2>/dev/null || echo vgit)"
          nfpm_epoch="$(git rev-list --all --count 2>/dev/null || echo 0)"
          build_time="$(date +%s)"

          echo "css_version=${css_version}" >> "${GITHUB_OUTPUT}"
          echo "app_version=${app_version#v}" >> "${GITHUB_OUTPUT}"
          echo "nfpm_epoch=${nfpm_epoch}" >> "${GITHUB_OUTPUT}"
          echo "build_time=${build_time}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=unstable,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILT_BY=${{ github.repository_owner }}
            JFA_GO_VERSION=${{ steps.build_version.outputs.app_version }}
            JFA_GO_CSS_VERSION=${{ steps.build_version.outputs.css_version }}
            JFA_GO_NFPM_EPOCH=${{ steps.build_version.outputs.nfpm_epoch }}
            JFA_GO_BUILD_TIME=${{ steps.build_version.outputs.build_time }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
